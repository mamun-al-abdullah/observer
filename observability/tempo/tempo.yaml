# Minimal single-binary Tempo (v3) with an OTLP receiver and local storage.
# Tempo 3.x uses sensible defaults for ingester/compactor, so we only declare
# the server, the OTLP receivers, and local block storage.
stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
