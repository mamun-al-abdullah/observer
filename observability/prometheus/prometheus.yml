global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Benchmark metrics, exported by the OTel Collector's Prometheus exporter.
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  # The collector's own internal metrics (optional, handy for debugging).
  - job_name: otel-collector-internal
    static_configs:
      - targets: ['otel-collector:8888']
